services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: skill_platform_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-skill_platform}
      POSTGRES_USER:     ${POSTGRES_USER:-skill_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/migrations/02_user_profiles_unique.sql:/docker-entrypoint-initdb.d/02_user_profiles_unique.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skill_user} -d ${POSTGRES_DB:-skill_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - skill_net

  # ── Python API (Flask + Gunicorn) ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: skill_platform_api
    restart: unless-stopped
    env_file: .env
    environment:
      # Override POSTGRES_HOST so the api container reaches postgres by service name
      POSTGRES_HOST: postgres
      FLASK_DEBUG:   "false"
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - skill_net

  # ── Frontend (Nginx + Vite build) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        # Empty string — Nginx proxies API calls on the same origin (port 80)
        VITE_API_URL: ""
    container_name: skill_platform_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - skill_net

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  skill_net:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
