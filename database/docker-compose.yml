services:
  postgres:
    image: postgres:16-alpine
    container_name: skill_platform_db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skill_platform}
      POSTGRES_USER: ${POSTGRES_USER:-skill_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skill_user} -d ${POSTGRES_DB:-skill_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
