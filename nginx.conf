server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # All backend endpoints are proxied to the api container on port 5000.
    # The browser only ever talks to port 80 — no CORS issues.
    location ~ ^/(analyze-profile|generate-test|evaluate-test|compute-path|chat|health) {
        proxy_pass         http://api:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward session token header
        proxy_pass_header  X-Session-Token;

        # Generous timeout for Gemini calls (retries on 503 can take up to 3 min)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── Static assets with cache headers ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
